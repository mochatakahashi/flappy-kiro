<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Kiro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      min-width: 300px;
      min-height: 225px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas" width="800" height="600"></canvas>
  <script type="module" src="src/game.js"></script>
</body>
</html>
